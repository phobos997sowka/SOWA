

<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>POLCAR BI Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:Arial;background:#0b1020;color:#fff}
header{padding:18px;background:#111827;font-size:28px;font-weight:bold}
.wrap{padding:18px;max-width:1500px;margin:auto}
textarea{width:100%;height:180px;background:#18233b;color:#fff;border:1px solid #334;padding:10px;border-radius:8px}
button{margin-top:10px;padding:10px 18px;font-size:16px;border:0;border-radius:8px;cursor:pointer}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:20px 0}
.card{background:#18233b;padding:15px;border-radius:10px}
.card b{font-size:30px;display:block;margin-top:8px}
table{width:100%;border-collapse:collapse;background:#18233b}
th,td{padding:8px;border-bottom:1px solid #2f3f5f}
th{background:#243250}
input{width:100%;padding:8px;margin:10px 0}
canvas{background:#18233b;border-radius:10px;padding:10px;margin:20px 0}
</style>
</head>
<body>
<header>POLCAR BI DASHBOARD</header>
<div class="wrap">
<h3>Wklej całe okno dostaw (Ctrl+V)</h3>
<textarea id="paste"></textarea><br>
<button onclick="parse()">Analizuj dane</button>

<div class="grid">
<div class="card">Wiersze<b id="k1">0</b></div>
<div class="card">Kolumny<b id="k2">0</b></div>
<div class="card">Unikalna kol.1<b id="k3">0</b></div>
<div class="card">Widoczne<b id="k4">0</b></div>
</div>

<input id="search" placeholder="Szukaj..." oninput="render()">
<canvas id="chart" height="80"></canvas>

<table>
<thead id="thead"></thead>
<tbody id="tbody"></tbody>
</table>
</div>
<script>
let rows=[],filtered=[];
let chart;
function parse(){
 const txt=document.getElementById('paste').value.trim();
 const lines=txt.split(/\r?\n/).filter(x=>x.trim());
 if(!lines.length)return;
 rows=lines.map(l=>l.split(/\t|;|\|/));
 document.getElementById('k1').innerText=Math.max(rows.length-1,0);
 document.getElementById('k2').innerText=rows[0].length;
 document.getElementById('k3').innerText=new Set(rows.slice(1).map(r=>r[0])).size;
 render();
 draw();
}
function render(){
 if(!rows.length)return;
 const q=document.getElementById('search').value.toLowerCase();
 filtered=rows.slice(1).filter(r=>r.join(' ').toLowerCase().includes(q));
 document.getElementById('k4').innerText=filtered.length;
 document.getElementById('thead').innerHTML='<tr>'+rows[0].map(x=>'<th>'+x+'</th>').join('')+'</tr>';
 document.getElementById('tbody').innerHTML=filtered.slice(0,20).map(r=>'<tr>'+r.map(c=>'<td>'+c+'</td>').join('')+'</tr>').join('');
}
function draw(){
 const map={};
 filtered.forEach(r=>{const k=r[0]||'Brak';map[k]=(map[k]||0)+1});
 const labels=Object.keys(map).slice(0,10);
 const data=labels.map(k=>map[k]);
 if(chart)chart.destroy();
 chart=new Chart(document.getElementById('chart'),{
 type:'bar',
 data:{labels:labels,datasets:[{label:'TOP 10',data:data}]},
 options:{plugins:{legend:{labels:{color:'white'}}},
 scales:{x:{ticks:{color:'white'}},y:{ticks:{color:'white'}}}}
 });
}
</script>
</body>
</html>
